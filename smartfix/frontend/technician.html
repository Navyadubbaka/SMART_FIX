<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Technician Dashboard</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <div>
          <h2 class="page-title">Technician Dashboard</h2>
          <p class="muted">Manage assigned tasks, availability, and resolution notes.</p>
        </div>
        <button onclick="logout()">Logout</button>
      </div>
      <div class="row">
        <div class="card">
          <h3>Availability</h3>
          <select id="availability">
            <option value="Available">Available</option>
            <option value="Busy">Busy</option>
          </select>
          <button id="availabilityBtn">Update Availability</button>
        </div>
        <div class="card">
          <h3>Performance</h3>
          <p id="perf" class="kpi">-</p>
        </div>
      </div>
      <div id="tasks"></div>
    </div>
    <script src="./js/api.js"></script>
    <script src="./js/technician.js"></script>
  </body>
</html>
