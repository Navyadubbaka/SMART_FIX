<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="./css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <div>
          <h2 class="page-title">Admin Dashboard</h2>
          <p class="muted">System-wide monitoring, analytics, and assignment override.</p>
        </div>
        <button onclick="logout()">Logout</button>
      </div>
      <div class="row">
        <div class="card"><h3>Total Complaints</h3><p id="totalComplaints" class="kpi">0</p></div>
        <div class="card"><h3>Avg Resolution (hrs)</h3><p id="avgHours" class="kpi">0</p></div>
      </div>
      <div class="row">
        <div class="card"><canvas id="categoryChart"></canvas></div>
        <div class="card"><canvas id="techChart"></canvas></div>
      </div>
      <div class="card">
        <h3>All Complaints</h3>
        <p class="muted">Pick a technician for manual override assignment.</p>
        <div id="adminComplaints"></div>
      </div>
    </div>
    <script src="./js/api.js"></script>
    <script src="./js/admin.js"></script>
  </body>
</html>
