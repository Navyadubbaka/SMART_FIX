<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submit Complaint</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="topbar">
        <div>
          <h2 class="page-title">Complaint Submission</h2>
          <p class="muted">Upload image and description for AI categorization.</p>
        </div>
        <div class="nav-links">
          <a href="./dashboard.html"><button class="btn-secondary">Back to Dashboard</button></a>
          <button onclick="logout()">Logout</button>
        </div>
      </div>
      <div class="card">
        <textarea id="description" placeholder="Describe the issue"></textarea>
        <input id="locationLabel" placeholder="Location (optional)" />
        <input id="image" type="file" accept="image/*" />
        <img id="preview" style="max-width: 240px; display: none; border-radius: 10px" />
        <div id="loading" style="display: none"><span class="spinner"></span> AI is classifying image...</div>
        <button id="submitBtn">Submit</button>
        <p id="msg"></p>
      </div>
    </div>
    <script src="./js/api.js"></script>
    <script src="./js/complaint.js"></script>
  </body>
</html>
