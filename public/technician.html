<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartFix | Technician Panel</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<nav class="navbar">
  <div class="logo">SmartFix</div>
  <div class="nav-right">
    <span class="role-badge tech-badge">Technician Panel</span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="dashboard">

  <div class="card">
    <h2>Assigned Complaints</h2>
    <p class="subtitle-text">
      Below are complaints assigned to you. Mark them resolved after completion.
    </p>
  </div>

  <div id="complaintList" class="complaint-grid"></div>

</div>


<!-- Call Modal -->
<div class="call-modal-overlay" id="callModalOverlay">
  <div class="call-modal">
    <button class="call-modal-close" onclick="closeCallModal()">&times;</button>
    <div class="call-modal-avatar call-pulse" id="callModalAvatar">U</div>
    <h3 class="call-modal-name" id="callModalName">User Name</h3>
    <p class="call-modal-role" id="callModalRole">User</p>
    <div class="call-modal-phone" id="callModalPhone">9876543210</div>
    <div class="call-modal-actions">
      <a class="call-modal-call-btn" id="callModalCallBtn" href="tel:">
        📞 Call Now
      </a>
      <button class="call-modal-copy-btn" id="callModalCopyBtn" onclick="copyPhoneNumber()">
        📋 Copy Number
      </button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
