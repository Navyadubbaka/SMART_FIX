<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartFix | Admin Panel</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<nav class="navbar">
  <div class="logo">SmartFix</div>
  <div class="nav-right">
    <span class="role-badge admin-badge">Admin Panel</span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="dashboard">

  <div class="stats-grid">
    <div class="stat-card">
      <h3>Total Complaints</h3>
      <p id="totalComplaints">0</p>
    </div>

    <div class="stat-card pending">
      <h3>Pending</h3>
      <p id="pendingComplaints">0</p>
    </div>

    <div class="stat-card resolved">
      <h3>Resolved</h3>
      <p id="resolvedComplaints">0</p>
    </div>

    <div class="stat-card tech">
      <h3>Total Technicians</h3>
      <p id="totalTechnicians">0</p>
    </div>
  </div>

 
  <div class="card">
    <h2>Technicians</h2>
    <div id="techList" class="grid-list"></div>
  </div>

  <div class="card">
    <h2>All Complaints</h2>
    <div id="complaintList" class="complaint-grid"></div>
  </div>

</div>


<!-- Call Modal -->
<div class="call-modal-overlay" id="callModalOverlay">
  <div class="call-modal">
    <button class="call-modal-close" onclick="closeCallModal()">&times;</button>
    <div class="call-modal-avatar call-pulse" id="callModalAvatar">T</div>
    <h3 class="call-modal-name" id="callModalName">Technician Name</h3>
    <p class="call-modal-role" id="callModalRole">Technician</p>
    <div class="call-modal-phone" id="callModalPhone">9876543210</div>
    <div class="call-modal-actions">
      <a class="call-modal-call-btn" id="callModalCallBtn" href="tel:">
        📞 Call Now
      </a>
      <button class="call-modal-copy-btn" id="callModalCopyBtn" onclick="copyPhoneNumber()">
        📋 Copy Number
      </button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
