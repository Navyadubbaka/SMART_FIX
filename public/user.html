<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartFix | User Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<nav class="navbar">
  <div class="logo">SmartFix</div>
  <div class="nav-right">
    <span class="role-badge">User Panel</span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="dashboard">

  <div class="card">
  <h2>Submit New Complaint</h2>

  <form id="complaintForm" enctype="multipart/form-data">

    <div class="form-group">
      <label>Describe Issue (Optional)</label>
      <textarea id="issue" placeholder="Describe your issue here..."></textarea>
    </div>

    <div class="form-group">
      <label>Upload Image</label>
      <input type="file" id="image" required>
      <small style="color:gray;">
        AI will automatically detect the issue category and assign a technician.
      </small>
    </div>

    <button type="submit" class="btn-primary">
      Submit Complaint
    </button>

  </form>
</div>

  <div class="card">
    <h2>Your Complaints</h2>
    <div id="complaintList" class="complaint-grid"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
